<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraSystem - Ödünç İşlemleri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#fafaf5;display:flex;min-height:100vh}
        .sidebar{width:220px;background:#fff;border-right:1px solid #e7e5e4;padding:24px 16px;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column}
        .logo{font-family:'Playfair Display',serif;font-size:18px;color:#1c1917;margin-bottom:32px}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;color:#6b7280;margin-bottom:4px;cursor:pointer;text-decoration:none}
        .nav-item:hover{background:#fef3c7;color:#92400e}
        .nav-item.active{background:#fef3c7;color:#92400e;font-weight:500}
        .logout{margin-top:auto;padding:10px 12px;border-radius:8px;font-size:14px;color:#e11d48;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;text-align:left}
        .main{margin-left:220px;padding:32px;flex:1}
        .header{margin-bottom:28px}
        .header h1{font-family:'Playfair Display',serif;font-size:24px;color:#1c1917}
        .section{font-family:'Playfair Display',serif;font-size:18px;color:#1c1917;margin-bottom:16px;margin-top:28px}
        .form-card{background:#fff;border:1px solid #e7e5e4;border-radius:12px;padding:24px;margin-bottom:32px}
        .form-row{display:flex;gap:12px;margin-bottom:12px}
        .form-row input{flex:1;padding:10px 14px;border:1px solid #e7e5e4;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none}
        .form-row input:focus{border-color:#d97706}
        .btn{padding:10px 20px;background:#92400e;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif}
        .btn-red{background:#e11d48}
        .table-wrap{background:#fff;border:1px solid #e7e5e4;border-radius:12px;overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th{background:#fef9f0;padding:12px 16px;font-size:12px;color:#78716c;text-align:left;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
        td{padding:12px 16px;font-size:13px;color:#374151;border-top:1px solid #f5f5f0}
        .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500}
        .b-borrowed{background:#fef3c7;color:#92400e}
        .b-returned{background:#f0fdf4;color:#16a34a}
        .b-overdue{background:#fff1f2;color:#e11d48}
        .btn-sm{padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #e7e5e4;background:#fff;color:#6b7280;font-family:'Inter',sans-serif}
        .toast{position:fixed;bottom:24px;right:24px;background:#1c1917;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;display:none;z-index:200}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">📚 LibraSystem</div>
    <a class="nav-item" href="/dashboard.html">Ana Sayfa</a>
    <a class="nav-item" href="/books.html">Kitaplar</a>
    <a class="nav-item active" href="/borrow.html">Ödünç İşlemleri</a>
    <a class="nav-item" href="/reservations.html">Rezervasyonlar</a>
    <a class="nav-item" href="/users.html">Kullanıcılar</a>
    <a class="nav-item" href="/reports.html">Raporlar</a>
    <button class="logout" onclick="logout()">Çıkış Yap</button>
</div>
<div class="main">
    <div class="header"><h1>Ödünç İşlemleri</h1></div>
    <div class="section">Yeni Ödünç Al</div>
    <div class="form-card">
        <div class="form-row">
            <input type="number" id="borrow-user-id" placeholder="Kullanıcı ID"/>
            <input type="text" id="borrow-isbn" placeholder="ISBN"/>
            <button class="btn" onclick="borrowBook()">Ödünç Al</button>
        </div>
    </div>
    <div class="section">Kullanıcı İşlem Geçmişi</div>
    <div class="form-card">
        <div class="form-row">
            <input type="number" id="history-user-id" placeholder="Kullanıcı ID"/>
            <button class="btn" onclick="loadHistory()">Geçmişi Göster</button>
        </div>
    </div>
    <div class="section">Aktif Ödünç Listesi</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>İşlem ID</th><th>Kitap</th><th>Kullanıcı</th><th>Ödünç Tarihi</th><th>Son Teslim</th><th>Durum</th><th>İşlem</th></tr></thead>
            <tbody id="borrow-table"></tbody>
        </table>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
    const token=localStorage.getItem('token');
    if(!token){window.location.href='/';}

    async function api(url,method='GET',body=null){
        const opts={method,headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}};
        if(body)opts.body=JSON.stringify(body);
        const res=await fetch(url,opts);
        return res.json();
    }

    function showToast(msg){
        const t=document.getElementById('toast');
        t.textContent=msg;t.style.display='block';
        setTimeout(()=>t.style.display='none',3000);
    }

    function renderTable(data){
        const tbody=document.getElementById('borrow-table');
        if(!data||data.length===0){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#78716c;padding:24px">İşlem bulunamadı</td></tr>';return;}
        tbody.innerHTML=data.map(t=>`
            <tr>
                <td>#${t.id}</td>
                <td>${t.book?.bookTitle||'-'}</td>
                <td>${t.user?.username||'-'}</td>
                <td>${t.borrowDate||'-'}</td>
                <td>${t.dueDate||'-'}</td>
                <td><span class="badge b-${t.status?.toLowerCase()}">${t.status}</span></td>
                <td>${t.status==='BORROWED'?`<button class="btn-sm" onclick="returnBook(${t.id})">İade Et</button>`:'-'}</td>
            </tr>`).join('');
    }

    async function borrowBook(){
        const userId=document.getElementById('borrow-user-id').value;
        const isbn=document.getElementById('borrow-isbn').value;
        if(!userId||!isbn){showToast('Kullanıcı ID ve ISBN girin!');return;}
        const data=await api('/api/borrow?userId='+userId+'&isbn='+isbn,'POST');
        showToast(data.id?'Kitap ödünç alındı!':'Hata: '+JSON.stringify(data));
        loadActive();
    }

    async function returnBook(id){
        const data=await api('/api/borrow/return/'+id,'POST');
        showToast(data.id?'Kitap iade edildi!':'Hata oluştu!');
        loadActive();
    }

    async function loadActive(){
        const data=await api('/api/borrow/active');
        renderTable(Array.isArray(data)?data:[]);
    }

    async function loadHistory(){
        const userId=document.getElementById('history-user-id').value;
        if(!userId){showToast('Kullanıcı ID girin!');return;}
        const data=await api('/api/borrow/user/'+userId);
        renderTable(Array.isArray(data)?data:[]);
    }

    function logout(){localStorage.clear();window.location.href='/';}

    loadActive();
</script>
</body>
</html>
