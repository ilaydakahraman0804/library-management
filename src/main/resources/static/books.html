<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraSystem - Kitaplar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#fafaf5;display:flex;min-height:100vh}
        .sidebar{width:220px;background:#fff;border-right:1px solid #e7e5e4;padding:24px 16px;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column}
        .logo{font-family:'Playfair Display',serif;font-size:18px;color:#1c1917;margin-bottom:32px}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;color:#6b7280;margin-bottom:4px;cursor:pointer;text-decoration:none}
        .nav-item:hover{background:#fef3c7;color:#92400e}
        .nav-item.active{background:#fef3c7;color:#92400e;font-weight:500}
        .logout{margin-top:auto;padding:10px 12px;border-radius:8px;font-size:14px;color:#e11d48;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;text-align:left}
        .main{margin-left:220px;padding:32px;flex:1}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
        .header h1{font-family:'Playfair Display',serif;font-size:24px;color:#1c1917}
        .filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
        .filters input{padding:10px 14px;border:1px solid #e7e5e4;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;flex:1;min-width:200px}
        .filters input:focus{border-color:#d97706}
        .filters button{padding:10px 20px;background:#92400e;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif}
        .filters button.outline{background:none;border:1px solid #e7e5e4;color:#6b7280}
        .books-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
        .book-card{background:#fff;border:1px solid #e7e5e4;border-radius:12px;padding:16px}
        .book-title{font-size:14px;font-weight:500;color:#1c1917;margin-bottom:3px}
        .book-author{font-size:12px;color:#78716c;margin-bottom:4px}
        .book-isbn{font-size:11px;color:#a8a29e;margin-bottom:10px}
        .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500}
        .available{background:#fef3c7;color:#92400e}
        .borrowed{background:#fff1f2;color:#e11d48}
        .action-row{display:flex;gap:8px;margin-top:12px}
        .btn-sm{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif}
        .btn-primary{background:#92400e;color:#fff}
        .btn-outline{background:none;border:1px solid #e7e5e4;color:#6b7280}
        .pagination{display:flex;gap:8px;margin-top:24px;justify-content:center}
        .page-btn{padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #e7e5e4;background:#fff;color:#6b7280;font-family:'Inter',sans-serif}
        .page-btn.active{background:#92400e;color:#fff;border-color:#92400e}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center}
        .modal.open{display:flex}
        .modal-card{background:#fff;border-radius:16px;padding:32px;width:440px}
        .modal-title{font-family:'Playfair Display',serif;font-size:18px;color:#1c1917;margin-bottom:20px}
        .modal input{width:100%;padding:10px 14px;border:1px solid #e7e5e4;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;margin-bottom:12px}
        .modal-btns{display:flex;gap:8px;margin-top:8px}
        .toast{position:fixed;bottom:24px;right:24px;background:#1c1917;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;display:none;z-index:200}
        .empty{text-align:center;padding:48px;color:#78716c;font-size:14px;grid-column:1/-1}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">📚 LibraSystem</div>
    <a class="nav-item" href="/dashboard.html">Ana Sayfa</a>
    <a class="nav-item active" href="/books.html">Kitaplar</a>
    <a class="nav-item" href="/borrow.html">Ödünç İşlemleri</a>
    <a class="nav-item" href="/reservations.html">Rezervasyonlar</a>
    <a class="nav-item" href="/users.html">Kullanıcılar</a>
    <a class="nav-item" href="/reports.html">Raporlar</a>
    <button class="logout" onclick="logout()">Çıkış Yap</button>
</div>
<div class="main">
    <div class="header">
        <h1>Kitaplar</h1>
    </div>
    <div class="filters">
        <input type="text" id="title-input" placeholder="Kitap adına göre ara..."/>
        <input type="text" id="author-input" placeholder="Yazara göre ara..."/>
        <button onclick="search()">Ara</button>
        <button class="outline" onclick="loadAvailable()">Sadece Müsait</button>
        <button class="outline" onclick="loadAll()">Tümünü Göster</button>
    </div>
    <div class="books-grid" id="books-grid">
        <div class="empty">Kitaplar yükleniyor...</div>
    </div>
    <div class="pagination" id="pagination"></div>
</div>
<div class="modal" id="borrow-modal">
    <div class="modal-card">
        <div class="modal-title">Kitap Ödünç Al</div>
        <p style="font-size:13px;color:#78716c;margin-bottom:16px" id="borrow-book-title"></p>
        <input type="number" id="borrow-user-id" placeholder="Kullanıcı ID girin"/>
        <div class="modal-btns">
            <button class="btn-sm btn-primary" onclick="confirmBorrow()">Ödünç Al</button>
            <button class="btn-sm btn-outline" onclick="closeModal()">İptal</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
    const token=localStorage.getItem('token');
    if(!token){window.location.href='/';}
    let selectedIsbn='';
    let currentPage=0;
    const pageSize=9;

    async function api(url,method='GET',body=null){
        const opts={method,headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}};
        if(body)opts.body=JSON.stringify(body);
        const res=await fetch(url,opts);
        return res.json();
    }

    function showToast(msg){
        const t=document.getElementById('toast');
        t.textContent=msg;t.style.display='block';
        setTimeout(()=>t.style.display='none',3000);
    }

    function renderBooks(books){
        const grid=document.getElementById('books-grid');
        if(!books||books.length===0){grid.innerHTML='<div class="empty">Kitap bulunamadı.</div>';return;}
        grid.innerHTML=books.map(b=>`
            <div class="book-card">
                <div class="book-title">${b.bookTitle||''}</div>
                <div class="book-author">${b.bookAuthor||''}</div>
                <div class="book-isbn">ISBN: ${b.isbn||''}</div>
                <span class="badge ${b.available?'available':'borrowed'}">${b.available?'Müsait':'Ödünç Alındı'}</span>
                <div class="action-row">
                    ${b.available?`<button class="btn-sm btn-primary" onclick="openBorrow('${b.isbn}','${(b.bookTitle||'').replace(/'/g,"\\'")}')">Ödünç Al</button>`:''}
                    ${!b.available?`<button class="btn-sm btn-outline" onclick="reserve('${b.isbn}')">Rezerve Et</button>`:''}
                </div>
            </div>`).join('');
    }

    async function loadAll(){
        const data=await api('/api/books');
        renderBooks(Array.isArray(data)?data.slice(0,pageSize):[] );
    }

    async function loadAvailable(){
        const data=await api('/api/books/available');
        renderBooks(Array.isArray(data)?data.slice(0,pageSize):[]);
    }

    async function search(){
        const title=document.getElementById('title-input').value;
        const author=document.getElementById('author-input').value;
        let data;
        if(title) data=await api('/api/books/search/title?title='+encodeURIComponent(title));
        else if(author) data=await api('/api/books/search/author?author='+encodeURIComponent(author));
        else data=await api('/api/books');
        renderBooks(Array.isArray(data)?data.slice(0,pageSize):[]);
    }

    function openBorrow(isbn,title){
        selectedIsbn=isbn;
        document.getElementById('borrow-book-title').textContent=title;
        document.getElementById('borrow-modal').classList.add('open');
    }

    function closeModal(){
        document.getElementById('borrow-modal').classList.remove('open');
    }

    async function confirmBorrow(){
        const userId=document.getElementById('borrow-user-id').value;
        if(!userId){showToast('Kullanıcı ID girin!');return;}
        const data=await api('/api/borrow?userId='+userId+'&isbn='+selectedIsbn,'POST');
        closeModal();
        showToast(data.id?'Kitap başarıyla ödünç alındı!':'Hata: '+JSON.stringify(data));
        loadAll();
    }

    async function reserve(isbn){
        const userId=prompt('Kullanıcı ID:');
        if(!userId)return;
        const data=await api('/api/reservations?userId='+userId+'&isbn='+isbn,'POST');
        showToast(data.id?'Rezervasyon oluşturuldu!':'Hata oluştu!');
    }

    function logout(){localStorage.clear();window.location.href='/';}

    loadAll();
</script>
</body>
</html>
